name: Fetch Sportmonks data

on:
  workflow_dispatch:
    inputs:
      entity:
        description: "Entity type to fetch"
        required: true
        type: choice
        options:
          - team-search
          - player-search
          - team
          - player
          - squad
          - team-stats
          - team-fixtures
          - head-to-head
          - standings
          - topscorers
          - league-seasons
          - fixture
          - my-leagues
      id:
        description: "Entity ID, or a name/query for *-search entities"
        required: true
        type: string
      include:
        description: "Override the default 'include' string (optional)"
        required: false
        type: string
      start:
        description: "Start date YYYY-MM-DD for team-fixtures (optional, defaults to Jan 1 this year)"
        required: false
        type: string
      end:
        description: "End date YYYY-MM-DD for team-fixtures (optional, defaults to Dec 31 this year)"
        required: false
        type: string

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch data
        continue-on-error: true
        env:
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}
        run: |
          python -m src.fetch \
            --entity "${{ inputs.entity }}" \
            --id "${{ inputs.id }}" \
            ${{ inputs.include != '' && format('--include "{0}"', inputs.include) || '' }} \
            ${{ inputs.start != '' && format('--start "{0}"', inputs.start) || '' }} \
            ${{ inputs.end != '' && format('--end "{0}"', inputs.end) || '' }} \
            --output "data/${{ inputs.entity }}-${{ inputs.id }}.csv"

      - name: Debug raw response (temporary)
        if: always() && inputs.entity == 'my-leagues'
        env:
          SPORTMONKS_API_TOKEN: ${{ secrets.SPORTMONKS_API_TOKEN }}
        run: |
          curl -s "https://api.sportmonks.com/v3/my/leagues?api_token=$SPORTMONKS_API_TOKEN" | python3 -m json.tool

      - uses: actions/upload-artifact@v4
        with:
          name: sportmonks-${{ inputs.entity }}-${{ inputs.id }}
          path: data/*.csv
        if: hashFiles('data/*.csv') != ''
